version: 2
project_name: lore

before:
  hooks:
    - go mod tidy

builds:
  - id: lore
    main: .
    binary: lore
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: lore-archive
    builds:
      - lore
    name_template: "lore_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: fayzkk889
    name: lore
  draft: false
  prerelease: auto

source:
  enabled: false

changelog:
  disable: true
